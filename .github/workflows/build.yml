name: Build VetFlowConnect.exe

on:
  push:
    paths:
      - 'scripts/vetflow_connect/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: pip install pyinstaller aiohttp pystray Pillow
      
      - name: Build EXE
        shell: bash
        run: |
          cd scripts/vetflow_connect
          pyinstaller --onefile --name VetFlowConnect --icon icon.ico --add-data "config.json.example;." --hidden-import pystray._win32 --hidden-import PIL --paths . --noconsole build_entry.py
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VetFlowConnect-Windows
          path: scripts/vetflow_connect/dist/VetFlowConnect.exe
